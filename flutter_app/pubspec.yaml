name:whatsapp_webrtc_clone
description: A real-time voice and video call implementation using WebRTC.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.10.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  animations: ^2.0.1
  crypto: ^3.0.3
  encrypt: ^5.0.1
  intl: ^0.19.0
  http: ^1.1.0
  socket_io_client: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
